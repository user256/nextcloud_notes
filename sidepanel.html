<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nextcloud Notes</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>

  <!-- LIST VIEW -->
  <div id="view-list" class="view active">
    <header class="app-header">
      <div class="logo">
        <svg class="logo-svg" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="4" width="16" height="16" rx="2" fill="var(--logo-fill)" stroke="var(--accent)" stroke-width="1.4"/>
          <circle cx="7" cy="4" r="1.6" fill="var(--bg)" stroke="var(--accent)" stroke-width="1.2"/>
          <circle cx="11" cy="4" r="1.6" fill="var(--bg)" stroke="var(--accent)" stroke-width="1.2"/>
          <circle cx="15" cy="4" r="1.6" fill="var(--bg)" stroke="var(--accent)" stroke-width="1.2"/>
          <line x1="6.5" y1="10.5" x2="15.5" y2="10.5" stroke="var(--accent)" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
          <line x1="6.5" y1="13.5" x2="15.5" y2="13.5" stroke="var(--accent)" stroke-width="1.1" stroke-linecap="round" opacity="0.4"/>
          <line x1="6.5" y1="16.5" x2="12" y2="16.5" stroke="var(--accent)" stroke-width="1.1" stroke-linecap="round" opacity="0.28"/>
        </svg>
        <span class="logo-text">Nextcloud Notes</span>
      </div>
      <div class="header-actions">
        <button id="btn-theme" class="btn-icon" title="Toggle light/dark mode">
          <svg id="icon-moon" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M12 8.8A5.5 5.5 0 015.2 2 6 6 0 1012 8.8z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <svg id="icon-sun" width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:none">
            <circle cx="7" cy="7" r="2.6" stroke="currentColor" stroke-width="1.4"/>
            <path d="M7 1v1.4M7 11.6V13M1 7h1.4M11.6 7H13M2.8 2.8l1 1M10.2 10.2l1 1M10.2 2.8l-1 1M2.8 10.2l1-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>

        <button id="btn-fetch-remote" class="btn-new btn-fetch" title="Fetch existing notes from Nextcloud">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <path d="M6.5 2.2v8.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3.8 8.6l2.7 2.8 2.7-2.8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Fetch
        </button>

        <button id="btn-new-note" class="btn-new" title="New Note">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <path d="M6.5 1.5v10M1.5 6.5h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          New
        </button>

        <button id="btn-settings" class="btn-icon" title="Settings (Nextcloud sync)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
            <path d="M7.5 10.1a2.6 2.6 0 1 0 0-5.2 2.6 2.6 0 0 0 0 5.2Z" stroke="currentColor" stroke-width="1.4"/>
            <path d="M3.7 6.1 2.4 5.4l.9-1.6 1.4.3a4.6 4.6 0 0 1 1.1-.7l.2-1.4h2l.2 1.4c.4.2.7.4 1.1.7l1.4-.3.9 1.6-1.3.7c.1.4.1.8 0 1.2l1.3.7-.9 1.6-1.4-.3c-.3.3-.7.5-1.1.7l-.2 1.4h-2l-.2-1.4c-.4-.2-.7-.4-1.1-.7l-1.4.3-.9-1.6 1.3-.7a3.6 3.6 0 0 1 0-1.2Z" stroke="currentColor" stroke-width="1.0" stroke-linejoin="round" opacity="0.9"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="search-wrap">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
        <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.4"/>
        <path d="M9 9l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search notes..." autocomplete="off" />
    </div>

    <div id="notes-list" class="notes-list">
      <div class="empty-state" id="empty-state">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" class="empty-pad-icon">
          <rect x="6" y="8" width="28" height="27" rx="3" stroke="var(--border2)" stroke-width="1.8"/>
          <circle cx="13" cy="8" r="2.8" fill="var(--bg)" stroke="var(--border2)" stroke-width="1.5"/>
          <circle cx="20" cy="8" r="2.8" fill="var(--bg)" stroke="var(--border2)" stroke-width="1.5"/>
          <circle cx="27" cy="8" r="2.8" fill="var(--bg)" stroke="var(--border2)" stroke-width="1.5"/>
          <line x1="11" y1="18" x2="29" y2="18" stroke="var(--border2)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="11" y1="23" x2="29" y2="23" stroke="var(--border2)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="11" y1="28" x2="22" y2="28" stroke="var(--border2)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p>No notes yet.</p>
        <span>
          Click <strong>New</strong> to start locally
          <span class="muted">or Fetch from Nextcloud.</span>
        </span>
      </div>
    </div>
  </div>

  <!-- EDITOR VIEW -->
  <div id="view-editor" class="view">
    <header class="editor-header">
      <button id="btn-back" class="btn-icon" title="Back to notes">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <input type="text" id="note-title" class="note-title-input" placeholder="Note title..." spellcheck="false" />
      <div class="editor-actions">
        <button id="btn-preview" class="btn-icon btn-toggle-preview" title="Toggle preview">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M1 7.5S3.5 3 7.5 3s6.5 4.5 6.5 4.5-2.5 4.5-6.5 4.5S1 7.5 1 7.5z" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </button>
        <button id="btn-save" class="btn-icon" title="Save note (local + optional sync)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
            <path d="M3 4.3V11.5c0 .8.6 1.5 1.4 1.5h6.2c.8 0 1.4-.7 1.4-1.5V6.1L10.2 4.3H3Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M4.2 4.3v3.2H10.8V4.3" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M6.1 11h2.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-download" class="btn-icon" title="Download as .txt">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 2v7M5 6.5l2.5 2.5L10 6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-delete" class="btn-icon btn-danger" title="Delete note">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M2.5 4h10M5.5 4V3h4v1M4.5 4v7.5h6V4h-6z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="toolbar">
      <button class="tool-btn" data-action="h1" title="Heading 1">H1</button>
      <button class="tool-btn" data-action="h2" title="Heading 2">H2</button>
      <button class="tool-btn" data-action="h3" title="Heading 3">H3</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-action="bold" title="Bold"><strong>B</strong></button>
      <button class="tool-btn" data-action="italic" title="Italic"><em>I</em></button>
      <button class="tool-btn" data-action="code-inline" title="Inline code">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 4L1 7l3 3M10 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-action="ul" title="Bullet list">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="2" cy="4" r="1" fill="currentColor"/><circle cx="2" cy="7" r="1" fill="currentColor"/><circle cx="2" cy="10" r="1" fill="currentColor"/><path d="M5 4h7M5 7h7M5 10h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-action="ol" title="Numbered list">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 3h1.2v3M1.5 6h2M5 4h7M5 7.5h7M5 11h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-action="link" title="Link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5.5 8.5a3.5 3.5 0 005 0l1.5-1.5a3.5 3.5 0 00-5-5L6.5 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8.5 5.5a3.5 3.5 0 00-5 0L2 7a3.5 3.5 0 005 5l.5-.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-action="table" title="Table">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M1 5h12M7 5v8M1 9h12" stroke="currentColor" stroke-width="1.3"/></svg>
      </button>
      <button class="tool-btn" data-action="code-block" title="Code block">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 5.5L2.5 7 4 8.5M10 5.5L11.5 7 10 8.5M7 5l-1 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="editor-body">
      <textarea id="note-editor" spellcheck="true" placeholder="Write in markdown...

# Heading 1
## Heading 2

**bold** _italic_ `code`

- Item one
- Item two

[Link text](https://url.com)"></textarea>
      <div id="note-preview" class="note-preview hidden"></div>
    </div>

    <div class="editor-footer">
      <span id="word-count">0 words</span>
      <div class="footer-right">
        <span id="sync-status" class="sync-status" title="Click to toggle Nextcloud sync">
          Local only
        </span>
        <span id="save-status" class="save-status">Saved</span>
      </div>
    </div>
  </div>

  <script src="marked.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
